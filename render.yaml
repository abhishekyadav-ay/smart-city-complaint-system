# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy using: https://dashboard.render.com/new/blueprint
# This file tells Render exactly how to build and run the backend

services:
  - type: web
    name: smart-city-api
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    healthCheckTimeout: 30
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "5000"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_SMTP_HOST
        sync: false
      - key: EMAIL_SMTP_PORT
        sync: false
      - key: EMAIL_SMTP_SECURE
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: USE_S3
        value: "false"
