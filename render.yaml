# Render Blueprint — https://render.com/docs/blueprint-spec
# After deploy: copy the service URL, set Netlify redirect to:
#   https://YOUR-SERVICE.onrender.com/api/:splat
# and set FRONTEND_URL (and secrets) on this service in the Render dashboard.

services:
  - type: web
    name: smart-city-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
