# Netlify — frontend-only static site configuration.
# Replace the redirect target with your Render backend URL after deploy.
[build]
  publish = "frontend"

[[redirects]]
  from = "/api/*"
  to = "https://smart-city-complaint-system-1.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://smart-city-complaint-system-1.onrender.com/uploads/:splat"
  status = 200
  force = true
